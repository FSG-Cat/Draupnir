# Copied from https://github.com/matrix-org/matrix-bifrost/blob/develop/.github/workflows/docker-hub-release.yml
# This is duplicated with docker-hub-release.yml the only difference is the tag and hook

name: "Docker Hub / GHCR - Latest"

on:
  release:
    types: [released]

env:
  DOCKER_NAMESPACE: gnuxie
  GHCR_IO_NAMESPACE: ${{ github.repository_owner }}
  PLATFORMS: linux/amd64,linux/arm64
  IMG_SOURCE: ${{ github.repository }}${{ github.ref_name }}

jobs:
  docker-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Get release tag
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Unshallow for git describe so we can create version.txt
        run: git fetch --prune --unshallow --tags --all --force
      # Needed for multi platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        id: dockerhub_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        id: ghcr_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Require one registry login
        if: ${{ always() && steps.dockerhub_login.outcome != 'success' && steps.ghcr_login.outcome != 'success' }}
        run: |
          echo "Docker Hub and GHCR authentication both failed."
          exit 1

      - name: Build and push image to Docker Hub and GHCR
        if: ${{ steps.dockerhub_login.outcome == 'success' && steps.ghcr_login.outcome == 'success' }}
        id: push_hybrid
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          labels: |
            org.opencontainers.image.source=${{ env.IMG_SOURCE }}
            org.opencontainers.image.licenses=AFL-3.0
          sbom: true
          tags: |
            ${{ env.DOCKER_NAMESPACE }}/draupnir:latest
            ghcr.io/${{ github.repository_owner }}/draupnir:latest

      - name: Build and push image to Docker Hub
        if: ${{ steps.dockerhub_login.outcome == 'success' && steps.ghcr_login.outcome != 'success' }}
        id: push_dockerhub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          labels: |
            org.opencontainers.image.source=${{ env.IMG_SOURCE }}
            org.opencontainers.image.licenses=AFL-3.0
          sbom: true
          tags: |
            ${{ env.DOCKER_NAMESPACE }}/draupnir:latest

      - name: Build and push image to GHCR
        if: ${{ steps.ghcr_login.outcome == 'success' && steps.dockerhub_login.outcome != 'success' }}
        id: push_ghcr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          labels: |
            org.opencontainers.image.source=${{ env.IMG_SOURCE }}
            org.opencontainers.image.licenses=AFL-3.0
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/draupnir:latest
